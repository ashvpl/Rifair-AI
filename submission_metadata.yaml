ai_usage_summary: |
  Used Gemini to design the ranking algorithms and construct TypeScript services for the Candidate Intelligence Engine. The ranker runs completely locally with no network calls and complies with CPU limits.

methodology_summary: |
  Implemented a high-performance Two-Stage Candidate Intelligence Engine in TypeScript. 
  - Stage 1 uses a fast keyword matching heuristic to filter 100k candidates to the top 2k in under 1 second.
  - Stage 2 evaluates features, local TF-IDF match, shipper/builder classifier, behavioral signals (recency decay), and a dedicated authenticity engine targeting honeypots. 
  - Generates diverse, fact-based reasoning strings for the top 100. Complete execution takes ~1.5s on CPU.

